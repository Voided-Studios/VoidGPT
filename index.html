<!DOCTYPE html>
<html>
<head>
  <title>VoidGPT v2</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="newChat()">+ New Chat</button>
    <div id="chatList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="chat" class="chat"></div>

    <div class="inputBar">
      <input id="input" placeholder="Message VoidGPT..." />

      <button onclick="sendMessage()">➤</button>
      <button onclick="startVC()">🎤</button>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
