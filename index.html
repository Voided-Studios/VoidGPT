<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoidGPT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🖥 DESKTOP -->
<div id="desktopApp" class="app">

  <div class="sidebar"></div>

  <div class="main">
    <div id="chat" class="chat"></div>

    <div class="inputBar">
      <input id="input" placeholder="Message VoidGPT..." />
      <button onclick="sendMessage()">➤</button>
      <button onclick="startVC()">🎤</button>
    </div>
  </div>

</div>

<!-- 📱 MOBILE -->
<div id="mobileApp" class="mobileApp">

  <div id="chatMobile" class="chat"></div>

  <div class="inputBar">
    <input id="inputMobile" placeholder="Ask VoidGPT..." />
    <button onclick="startVC()">🎤</button>
    <button onclick="sendMessageMobile()">➤</button>
  </div>

</div>

<script src="script.js"></script>

<script>
function checkDevice() {
  const mobile = window.innerWidth <= 768;

  document.getElementById("desktopApp").style.display = mobile ? "none" : "flex";
  document.getElementById("mobileApp").style.display = mobile ? "flex" : "none";
}

window.addEventListener("load", checkDevice);
window.addEventListener("resize", checkDevice);
</script>

</body>
</html>
