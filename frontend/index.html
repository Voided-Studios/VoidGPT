<!DOCTYPE html>
<html>
<head>
  <title>VoidGPT</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b10;
      color: white;
    }

    .chat {
      height: 90vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .user {
      background: #2a2a2a;
      text-align: right;
    }

    .ai {
      background: #1a1a2e;
    }

    .input-box {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #11111a;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: #222;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Talk to VoidGPT..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script src="script.js"></script>

</body>
</html>
