<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoidGPT</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b10;
      color: white;
    }

    .header {
      padding: 15px;
      background: #11111a;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .chat {
      height: calc(100vh - 120px);
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .user {
      background: #2a2a2a;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #1a1a2e;
      margin-right: auto;
    }

    .input-box {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #11111a;
      padding: 10px;
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      border-radius: 6px;
      background: #222;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<div class="header">🌑 VoidGPT</div>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Talk to VoidGPT..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script src="script.js"></script>

</body>
</html>
