<!DOCTYPE html>
<html>
<head>
  <title>VoidGPT</title>
  <style>
    body {
      margin: 0;
      background: #0b0b10;
      color: white;
      font-family: Arial;
    }

    .chat {
      height: 90vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 5px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .user {
      background: #2a2a2a;
      text-align: right;
    }

    .ai {
      background: #1a1a2e;
    }

    .input-box {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Talk to VoidGPT..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_URL = "https://YOUR-RENDER-URL.onrender.com/chat";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;

  addMsg("You: " + msg, "user");
  input.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    addMsg("VoidGPT: " + data.reply, "ai");
  } catch (e) {
    addMsg("VoidGPT: Error connecting to void.", "ai");
  }
}
</script>

</body>
</html>
